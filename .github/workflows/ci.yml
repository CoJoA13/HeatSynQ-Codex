name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            NuGet.Config

      - name: Restore
        run: dotnet restore HeatSynQ.slnx --configfile NuGet.Config

      - name: Verify formatting
        run: dotnet format HeatSynQ.slnx --no-restore --verify-no-changes

      - name: Build
        run: dotnet build HeatSynQ.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test HeatSynQ.slnx --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
